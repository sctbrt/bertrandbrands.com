<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Warm neutral base — vivid saturation, mobile-optimized -->
    <radialGradient id="base" cx="0.4" cy="0.45" r="0.75">
      <stop offset="0%" stop-color="#CC8818"/>
      <stop offset="100%" stop-color="#8560BE"/>
    </radialGradient>
    <!-- Amber pool: top-left, full saturation -->
    <radialGradient id="amber" cx="0.3" cy="0.25" r="0.85">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="1"/>
      <stop offset="25%" stop-color="#E07800" stop-opacity="1"/>
      <stop offset="50%" stop-color="#D97706" stop-opacity="0.7"/>
      <stop offset="75%" stop-color="#9B6ABB" stop-opacity="0.15"/>
      <stop offset="100%" stop-opacity="0"/>
    </radialGradient>
    <!-- Blue pool: bottom-right, deep saturated -->
    <radialGradient id="blue" cx="0.85" cy="0.88" r="0.7">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="1"/>
      <stop offset="30%" stop-color="#1D4ED8" stop-opacity="0.75"/>
      <stop offset="55%" stop-color="#4F46E5" stop-opacity="0.3"/>
      <stop offset="100%" stop-opacity="0"/>
    </radialGradient>
    <!-- Violet bloom: center-right, rich purple -->
    <radialGradient id="violet" cx="0.6" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.75"/>
      <stop offset="50%" stop-color="#6D28D9" stop-opacity="0.38"/>
      <stop offset="100%" stop-opacity="0"/>
    </radialGradient>
    <!-- Amber secondary: bottom-left warmth bleed -->
    <radialGradient id="warm2" cx="0.18" cy="0.7" r="0.55">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.82"/>
      <stop offset="40%" stop-color="#D97706" stop-opacity="0.45"/>
      <stop offset="100%" stop-opacity="0"/>
    </radialGradient>
    <!-- Wavy distortion filter — applied to gradients only -->
    <filter id="wave" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="4" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="30" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Clip to rounded rect -->
    <clipPath id="shape">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>
  <!-- Background rounded rect (unfiltered) -->
  <rect width="512" height="512" rx="96" fill="url(#base)"/>
  <!-- Wavy gradient layers — oversized rects so distortion stays interior, clipped to icon shape -->
  <!-- Outer group clips cleanly; inner group filters without boundary artifacts -->
  <g clip-path="url(#shape)">
    <g filter="url(#wave)">
      <rect x="-150" y="-150" width="812" height="812" fill="#9060F0"/>
      <rect x="-150" y="-150" width="812" height="812" fill="url(#amber)"/>
      <rect x="-150" y="-150" width="812" height="812" fill="url(#blue)"/>
      <rect x="-150" y="-150" width="812" height="812" fill="url(#violet)"/>
      <rect x="-150" y="-150" width="812" height="812" fill="url(#warm2)"/>
    </g>
  </g>
  <!-- Dot shadow for contrast at small sizes -->
  <defs>
    <filter id="dotShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="3.5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Dots with shadow halo for legibility — 78% scale for mobile readability -->
  <g fill="#ffffff" filter="url(#dotShadow)" transform="translate(256,256) scale(0.78) translate(-256,-256)">
    <circle cx="144" cy="88" r="22"/><circle cx="200" cy="88" r="22"/><circle cx="256" cy="88" r="22"/><circle cx="312" cy="88" r="22"/>
    <circle cx="144" cy="144" r="22"/><circle cx="200" cy="144" r="22"/><circle cx="312" cy="144" r="22"/><circle cx="368" cy="144" r="22"/>
    <circle cx="144" cy="200" r="22"/><circle cx="200" cy="200" r="22"/><circle cx="312" cy="200" r="22"/><circle cx="368" cy="200" r="22"/>
    <circle cx="144" cy="256" r="22"/><circle cx="200" cy="256" r="22"/><circle cx="256" cy="256" r="22"/><circle cx="312" cy="256" r="22"/>
    <circle cx="144" cy="312" r="22"/><circle cx="200" cy="312" r="22"/><circle cx="312" cy="312" r="22"/><circle cx="368" cy="312" r="22"/>
    <circle cx="144" cy="368" r="22"/><circle cx="200" cy="368" r="22"/><circle cx="312" cy="368" r="22"/><circle cx="368" cy="368" r="22"/>
    <circle cx="144" cy="424" r="22"/><circle cx="200" cy="424" r="22"/><circle cx="256" cy="424" r="22"/><circle cx="312" cy="424" r="22"/>
  </g>
</svg>
