  <line class="line-faint" x1="668" y1="0" x2="668" y2="630" stroke-width="0.5" stroke-dasharray="1,8"/>

  <!-- Diagonal construction lines through B center -->
  <line class="line-faint" x1="300" y1="15" x2="900" y2="615" stroke-width="0.5" stroke-dasharray="3,8"/>
