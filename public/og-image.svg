  <!-- Mapped from 512 viewBox: scale ~1.21x        -->
  <!-- Offset: cx = (origX - 256) * 1.21 + 600      -->
  <!--         cy = (origY - 256) * 1.21 + 315      -->
  <!-- ============================================ -->

  <g class="dot">
    <!-- Row 1 (y=88): 4 dots -->
    <circle cx="464.6" cy="111.8" r="17"/>
    <circle cx="532.4" cy="111.8" r="17"/>
    <circle cx="600.0" cy="111.8" r="17"/>
