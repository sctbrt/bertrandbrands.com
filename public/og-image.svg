<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Amber color at various opacities -->
    <style>
      .dot { fill: #D97706; }
      .line { stroke: #D97706; fill: none; }
      .line-faint { stroke: #1a1916; stroke-opacity: 0.18; fill: none; }
      .line-subtle { stroke: #1a1916; stroke-opacity: 0.3; fill: none; }
      .line-medium { stroke: #D97706; stroke-opacity: 0.5; fill: none; }
      .circle-guide { stroke: #1a1916; stroke-opacity: 0.22; fill: none; }
      .tick { stroke: #1a1916; stroke-opacity: 0.35; fill: none; }
      .label { fill: #1a1916; fill-opacity: 0.3; font-family: 'Inter', 'Helvetica Neue', sans-serif; font-size: 9px; letter-spacing: 0.08em; }
      .line-amber { stroke: #D97706; stroke-opacity: 0.2; fill: none; }
      .circle-amber { stroke: #D97706; stroke-opacity: 0.15; fill: none; }
      .node { fill: #1a1916; fill-opacity: 0.3; }
      .node-amber { fill: #D97706; fill-opacity: 0.25; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#F5F0E8"/>

  <!-- ============================================ -->
  <!-- ARCHITECTURAL CONSTRUCTION LINES             -->
  <!-- ============================================ -->

  <!-- Major grid lines (full canvas span) -->
  <line class="line-faint" x1="0" y1="315" x2="1200" y2="315" stroke-width="1"/>
  <line class="line-faint" x1="600" y1="0" x2="600" y2="630" stroke-width="1"/>

  <!-- B bounding box guides (full canvas span) -->
  <line class="line-faint" x1="0" y1="112" x2="1200" y2="112" stroke-width="1" stroke-dasharray="2,6"/>
  <line class="line-faint" x1="0" y1="518" x2="1200" y2="518" stroke-width="1" stroke-dasharray="2,6"/>
  <line class="line-faint" x1="465" y1="0" x2="465" y2="630" stroke-width="1" stroke-dasharray="2,6"/>
  <line class="line-faint" x1="735" y1="0" x2="735" y2="630" stroke-width="1" stroke-dasharray="2,6"/>

  <!-- Row guides through each dot row (full canvas span) -->
  <line class="line-faint" x1="0" y1="180" x2="1200" y2="180" stroke-width="0.5" stroke-dasharray="1,8"/>
  <line class="line-faint" x1="0" y1="247" x2="1200" y2="247" stroke-width="0.5" stroke-dasharray="1,8"/>
  <line class="line-faint" x1="0" y1="383" x2="1200" y2="383" stroke-width="0.5" stroke-dasharray="1,8"/>
  <line class="line-faint" x1="0" y1="450" x2="1200" y2="450" stroke-width="0.5" stroke-dasharray="1,8"/>

  <!-- Column guides through each dot column (full canvas span) -->
